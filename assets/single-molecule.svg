<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" role="img" aria-labelledby="t d">
<title id="t">Single-molecule optical tweezers assay</title>
<desc id="d">Two optically trapped beads hold a long telomeric DNA molecule while fluorescent shelterin proteins are imaged by confocal microscopy.</desc>
<defs>
 <linearGradient id="bg" x1="0" x2="1"><stop stop-color="#fff8fc"/><stop offset=".5" stop-color="#f8fbff"/><stop offset="1" stop-color="#f5fbfc"/></linearGradient>
 <radialGradient id="bead"><stop offset="0" stop-color="#fff"/><stop offset=".68" stop-color="#d9e0ec"/><stop offset="1" stop-color="#8d95a7"/></radialGradient>
 <linearGradient id="scan" x1="0" x2="0" y1="0" y2="1"><stop stop-color="#e11d74" stop-opacity=".06"/><stop offset=".5" stop-color="#15b7c6" stop-opacity=".28"/><stop offset="1" stop-color="#15b7c6" stop-opacity=".04"/></linearGradient>
 <filter id="glow"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<rect width="1200" height="560" rx="28" fill="url(#bg)"/>
<text x="80" y="86" font-family="Inter,Arial,sans-serif" font-size="22" font-weight="700" fill="#0a0f1e">Watching shelterin assemble on one DNA molecule</text>
<text x="80" y="118" font-family="Inter,Arial,sans-serif" font-size="15" fill="#535b6b">Optical tweezers hold the tether; confocal fluorescence reveals binding, movement, and compaction</text>

<!-- laser cones -->
<path d="M96 128L270 274L444 128Z" fill="#e11d74" opacity=".10"/><path d="M756 128L930 274L1104 128Z" fill="#e11d74" opacity=".10"/>
<path d="M390 505L590 200L790 505Z" fill="url(#scan)"/>
<text x="590" y="490" text-anchor="middle" font-family="IBM Plex Mono,monospace" font-size="14" fill="#0e8791">CONFOCAL SCAN</text>

<!-- beads -->
<circle cx="270" cy="300" r="105" fill="url(#bead)" stroke="#747f95" stroke-width="7"/>
<circle cx="930" cy="300" r="105" fill="url(#bead)" stroke="#747f95" stroke-width="7"/>
<circle cx="270" cy="300" r="72" fill="#ffffff" opacity=".38"/><circle cx="930" cy="300" r="72" fill="#ffffff" opacity=".38"/>
<text x="270" y="440" text-anchor="middle" font-family="IBM Plex Mono,monospace" font-size="14" fill="#535b6b">TRAPPED BEAD 1</text>
<text x="930" y="440" text-anchor="middle" font-family="IBM Plex Mono,monospace" font-size="14" fill="#535b6b">TRAPPED BEAD 2</text>

<!-- DNA tether -->
<path d="M365 300 C430 265 468 335 520 300 S615 265 668 300 S770 335 835 300" fill="none" stroke="#15b7c6" stroke-width="10" stroke-linecap="round"/>
<path d="M365 318 C430 283 468 353 520 318 S615 283 668 318 S770 353 835 318" fill="none" stroke="#e11d74" stroke-width="5" stroke-linecap="round" opacity=".9"/>

<!-- shelterin proteins -->
<g filter="url(#glow)">
 <g transform="translate(445 269)"><circle r="18" fill="#e11d74"/><circle cx="25" cy="14" r="15" fill="#f1a8ca"/><circle cx="-20" cy="18" r="14" fill="#15b7c6"/><path d="M-32 29Q0 50 37 28" fill="none" stroke="#0a0f1e" stroke-width="3"/></g>
 <g transform="translate(560 285)"><circle r="18" fill="#e11d74"/><circle cx="25" cy="14" r="15" fill="#f1a8ca"/><circle cx="-20" cy="18" r="14" fill="#15b7c6"/><path d="M-32 29Q0 50 37 28" fill="none" stroke="#0a0f1e" stroke-width="3"/></g>
 <g transform="translate(680 270)"><circle r="18" fill="#e11d74"/><circle cx="25" cy="14" r="15" fill="#f1a8ca"/><circle cx="-20" cy="18" r="14" fill="#15b7c6"/><path d="M-32 29Q0 50 37 28" fill="none" stroke="#0a0f1e" stroke-width="3"/></g>
 <g transform="translate(775 292)"><circle r="18" fill="#e11d74"/><circle cx="25" cy="14" r="15" fill="#f1a8ca"/><circle cx="-20" cy="18" r="14" fill="#15b7c6"/><path d="M-32 29Q0 50 37 28" fill="none" stroke="#0a0f1e" stroke-width="3"/></g>
</g>
<circle cx="560" cy="248" r="8" fill="#8be9f0"/><circle cx="680" cy="232" r="8" fill="#8be9f0"/><circle cx="775" cy="255" r="8" fill="#8be9f0"/>
<text x="595" y="178" text-anchor="middle" font-family="Inter,Arial" font-size="15" fill="#535b6b">fluorescent shelterin assemblies</text>
<path d="M595 190L680 230" stroke="#8d95a7" stroke-width="2"/>
</svg>