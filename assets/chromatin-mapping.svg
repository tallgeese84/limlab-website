<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" role="img" aria-labelledby="t d">
<title id="t">Telomere chromatin mapping schematic</title>
<desc id="d">A long telomeric DNA molecule with shelterin-linked methylases depositing methylation marks for long-read chromatin mapping.</desc>
<defs>
  <linearGradient id="bg" x1="0" x2="1"><stop stop-color="#f8fbff"/><stop offset="1" stop-color="#fff7fb"/></linearGradient>
  <linearGradient id="dna" x1="0" x2="1"><stop stop-color="#15b7c6"/><stop offset="1" stop-color="#e11d74"/></linearGradient>
</defs>
<rect width="1200" height="560" rx="28" fill="url(#bg)"/>
<g opacity=".55" stroke="#d9deea" stroke-width="1"><path d="M80 110H1120M80 450H1120"/><path d="M180 70V490M1020 70V490"/></g>
<text x="80" y="86" font-family="Inter,Arial,sans-serif" font-size="22" font-weight="700" fill="#0a0f1e">Protein-guided m6A footprinting across a single telomere</text>
<text x="80" y="118" font-family="Inter,Arial,sans-serif" font-size="15" fill="#535b6b">Methylase-tagged shelterin proteins mark accessible adenines for long-read mapping</text>

<!-- DNA track -->
<path d="M84 350 C155 326 205 374 274 350 S395 326 464 350 S585 374 654 350 S775 326 844 350 S965 374 1116 350" fill="none" stroke="url(#dna)" stroke-width="15" stroke-linecap="round"/>
<path d="M84 375 C155 351 205 399 274 375 S395 351 464 375 S585 399 654 375 S775 351 844 375 S965 399 1116 375" fill="none" stroke="#394260" stroke-width="5" stroke-linecap="round" opacity=".75"/>

<!-- subtelomere blocks -->
<g transform="translate(86 319)"><rect width="160" height="66" rx="20" fill="#0e152b"/><g fill="#15b7c6"><rect x="14" y="15" width="28" height="36" rx="9"/><rect x="47" y="15" width="28" height="36" rx="9"/><rect x="80" y="15" width="28" height="36" rx="9"/></g><g fill="#ff8a5b"><rect x="113" y="15" width="16" height="36" rx="8"/><rect x="134" y="15" width="16" height="36" rx="8"/></g></g>
<text x="98" y="425" font-family="IBM Plex Mono,monospace" font-size="14" fill="#535b6b">SUBTELOMERE</text>
<text x="943" y="425" font-family="IBM Plex Mono,monospace" font-size="14" fill="#535b6b">TELOMERE REPEATS</text>

